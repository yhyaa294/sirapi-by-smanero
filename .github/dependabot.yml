version: 2
updates:
  # Frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  # AI Engine (pip)
  - package-ecosystem: "pip"
    directory: "/ai-engine"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  # Backend (Go modules)
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
