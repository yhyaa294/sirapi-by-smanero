name: Release Backend

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release Backend
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          check-latest: true

      - name: Build Backend
        run: |
          cd backend
          go mod download
          go build -o smartapd-backend.exe .
        env:
          GOOS: windows
          GOARCH: amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartapd-backend
          path: backend/smartapd-backend.exe
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: backend/smartapd-backend.exe
          generate_release_notes: true
