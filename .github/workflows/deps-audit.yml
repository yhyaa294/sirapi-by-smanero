name: Security Audit

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Dependency Audit
    steps:
      - uses: actions/checkout@v4

      # Frontend Audit (npm)
      - name: Audit Frontend (npm)
        continue-on-error: true
        run: |
          cd frontend
          npm audit --json > ../npm-audit-report.json || true
          cat ../npm-audit-report.json

      # AI Engine Audit (pip)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Audit AI Engine (pip)
        continue-on-error: true
        run: |
          pip install pip-audit
          cd ai-engine
          # Assuming requirements.txt exists
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json > ../pip-audit-report.json || true
          else
             echo "No requirements.txt found in ai-engine"
          fi
          cat ../pip-audit-report.json || true

      # Backend Audit (Go)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Nancy (Golang Security Audit)
        run: |
          go install github.com/sonatype-nexus-community/nancy@latest

      - name: Audit Backend (Go)
        continue-on-error: true
        run: |
          cd backend
          go list -json -m all | nancy sleuth --output=json > ../go-audit-report.json || true
          cat ../go-audit-report.json || true
      
      # Upload Reports
      - name: Upload Audit Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            npm-audit-report.json
            pip-audit-report.json
            go-audit-report.json
