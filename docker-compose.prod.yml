version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/smartapd_prod.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - smartapd-net

  # Go Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      # - DATABASE_URL=postgres://user:pass@db:5432/smartapd
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    restart: always
    networks:
      - smartapd-net
    # Port 8080 is NOT exposed to host, only to internal network

    # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
    restart: always
    networks:
      - smartapd-net

  # AI Engine (Python)
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped
    networks:
      - smartapd-net

networks:
  smartapd-net:
    driver: bridge
